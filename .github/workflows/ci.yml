name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy cognitive_engine agent_federation perception_layer observability --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short

  cognitive-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Test Knowledge Graph Engine
        run: python -m cognitive_engine.knowledge_graph.code_graph

      - name: Test Consensus Protocol
        run: python -m agent_federation.consensus_protocol.raft_consensus

      - name: Test Token Telemetry
        run: python -m observability.token_telemetry.collector

      - name: Test AST Parser
        run: python -m perception_layer.ast_parser.parser

      - name: Test Control Flow Analyzer
        run: python -m perception_layer.control_flow_analyzer.analyzer

      - name: Test Data Flow Tracker
        run: python -m perception_layer.data_flow_tracker.tracker

  federation-stress:
    runs-on: ubuntu-latest
    needs: cognitive-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Run federation stress test
        run: |
          python -c "
          import asyncio
          from agent_federation.consensus_protocol.raft_consensus import FederationConsensus, AgentRole

          async def stress_test():
              agents = ['architect', 'quantum', 'semantic', 'synthesis', 'oracle']
              federation = [FederationConsensus(aid, agents) for aid in agents]
              for f in federation:
                  f.agent_weights = {a: 1.0 for a in agents}
              for f in federation:
                  asyncio.create_task(f.start())
              await asyncio.sleep(3)
              leader = next((f for f in federation if f.role == AgentRole.LEADER), None)
              if leader:
                  for i in range(10):
                      action = {'type': 'test', 'complexity': 50, 'id': i}
                      await leader.propose(action)
                  print(f'Stress test passed: {len(leader.get_committed_actions())} proposals committed')
              else:
                  print('No leader elected')

          asyncio.run(stress_test())
          "
